<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <title>signin form</title>
</head>

<body>
    <div class="login-box">
        <form class="formcontainer">
            <h2>
                <center>Sign In</center>
            </h2>

            <div class="name">
                <label>Username:</label>
                <input class="box1" type="text" placeholder="Username" required>
            </div>

            <div class="pass">
                <label>Password:</label>
                <input class="box2" type="password" placeholder="Password" required>
            </div>

            <button class="login" type="submit">Login</button>

            <div class="extra">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </div>
            <div class="back">
                <a href="index.html"> ← Back</a>
            </div>
        </form>
    </div>
</body>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background-color: #DEE0D3;
        width: 100%;
        height: auto;
    }

    .login-box {
        display: flex;
        align-items: center;
        margin-top: 160px;
        margin-left: 600px;
        
    }

    .formcontainer {
        gap: 30px;
        display: flex;
        flex-direction: column;
        width: 350px;
        padding: 12px 40px 12px 12px;
        font-size: 15px;
        border: 1px solid #ccc;
        border-radius: 8px;
        background-color: #fff;
        
    }

    h2 {
        font-family: 'Poppins', sans-serif;
        color: black;
        text-align: center;
    }

    .login {
        padding: 8px 2px 8px 2px ;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background-color: orange;
        color: black;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        justify-content: center;
    }
    .name{
        font-size: 20px;
        display: flex;
        justify-content: center;
    }
    .pass{
        font-size: 20px;
        display: flex;
        justify-content: center;
        padding: 2px;
    }
    .box1,.box2{
       padding: 5px;
       display: flex;
       cursor: pointer;
       
    }
    .extra {
        font-size: 18px;
        display: flex;
        justify-content: center;
    }
    .back{
        padding :5px 10px;
    }
    
    .back a{
    
        text-decoration: none;
        display:flex;
        justify-content: center;
        font-size: 20px;
        color:black
       
    }
</style>

</html>
