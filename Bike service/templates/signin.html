<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <title>Sign In - Omega Bike Service</title>
</head>

<body>
    <div class="login-box">
        <!-- IMPORTANT CHANGES HERE -->
        <form class="formcontainer" action="/login" method="POST">
            <h2>Sign In</h2>

            <div class="name">
                <label>Username:</label>
                <!-- name added -->
                <input class="box1" type="text" name="username" placeholder="Username" required>
            </div>

            <div class="pass">
                <label>Password:</label>
                <!-- name added -->
                <input class="box2" type="password" name="password" placeholder="Password" required>
            </div>

            <button class="login" type="submit">Login</button>

            <div class="extra">
                Don't have an account? 
                <!-- Flask route -->
                <a href="/signup">Sign Up</a>
            </div>

            <div class="back">
                <!-- Flask home route -->
                <a href="/"> ← Back</a>
            </div>

        </form>
    </div>
</body>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        background-color: #DEE0D3;
        width: 100%;
        height: auto;
    }

    .login-box {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .formcontainer {
        gap: 20px;
        display: flex;
        flex-direction: column;
        width: 350px;
        padding: 30px;
        border: 1px solid #ccc;
        border-radius: 8px;
        background-color: #fff;
    }

    h2 {
        text-align: center;
    }

    .login {
        padding: 10px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background-color: orange;
        color: black;
        cursor: pointer;
        transition: 0.3s;
    }

    .login:hover {
        background-color: #e68a00;
        color: white;
    }

    .name, .pass {
        display: flex;
        flex-direction: column;
        font-size: 14px;
    }

    .box1, .box2 {
        padding: 8px;
        margin-top: 5px;
    }

    .extra {
        font-size: 14px;
        text-align: center;
    }

    .extra a {
        text-decoration: none;
        color: orange;
        font-weight: 600;
    }

    .back {
        text-align: center;
        margin-top: 10px;
    }

    .back a {
        text-decoration: none;
        color: black;
    }
</style>

</html>
