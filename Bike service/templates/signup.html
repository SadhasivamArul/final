<!DOCTYPE html>
<html>

<head>
    <title>signup form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body>
    <div class="signup">
        <form class="upcontainer">
            <h3>Sign Up</h3>
            <div class="input"><label>Firstname:</label>
                <input type="text" placeholder="Firstname" required>
            </div>
            <div class="input">
                <lable>Lastname:</lable>
                <input class="input" type="text" placeholder="Lastname" required>
            </div>
            <div class="radio-container"> <label>Gender:
                    <input type="radio" name="gender" value="male" required>
                    Male<input type="radio" name="gender" value="female" required>
                    Female
                </label></div>
            <div class="input"> <label>Mob No:</label>
                <input class="input" id="phone" type="tel" name="mobile" placeholder="Enter Mobile Number"
                    pattern="[0-9]" required>
            </div>
            <div class="input">
                <lable>Whatsapp:</lable>
                <input class="input" id="phone" type="tel" name="mobile" placeholder="Enter Mobile Number"
                    pattern="[0-9]" required>
            </div>
            <div class="input">
                <lable>Alternate Mob no:</lable>
                <input class="input" id="phone" type="tel" name="mobile" placeholder="Enter Mobile Number"
                    pattern="[0-9]" required>
            </div>
            <div class="input"><label>Email:</label>
                <input class="input" type="text" placeholder="enter email" required>
            </div>
            <div class="input"><label>Address:</label>
                <input class="input" type="text" placeholder="enter address" required>
            </div>
            <div class="input"><label>Username:</label>
                <input class="input" type="text" placeholder="enter username" required>
            </div>
            <div class="input"><label>Password:</label>
                <input class="input" type="text" placeholder="enter Password" required>
            </div>
            <div class="input"><label>Confirm Password:</label>
                <input class="input" type="text" placeholder="confirm Password">
            </div>
            <button>submit</button>

        </form>
    </div>

</body>

</html>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background-color: #DEE0D3;
        width: 100%;
        height: auto;
    }

    .signup {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .upcontainer {
        width: 450px;
        background: white;
        padding: 50px;
        border-radius: 10px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
    }

    h3 {
        font-size: 30px;
        font-family: 'poppins', sans-serif;
        margin-bottom: 50px;
        text-align: center;
    }

    .input {
        margin-bottom: 15px;
        position: relative;
    }

    .input input {
        width: 170px;
        height: 25px;
        padding: 10px;
        border: 1px solid black;
        border-radius: 4px;
        outline: none;
        transition: 0.3s;

    }

    .input input:focus {
        border-color: orange;
    }

    .radiocontainer {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
    }
</style>
